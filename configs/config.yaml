# ============================================================
#  Self-Healing RAG — Global Configuration
# ============================================================

app:
  name: "Self-Healing RAG"
  version: "0.1.0"
  debug: false

# ── Ingestion ────────────────────────────────────────────────
ingestion:
  chunk_size: 512 # tokens / characters per chunk
  chunk_overlap: 64 # overlap between consecutive chunks
  chunking_strategy: "recursive" # recursive | semantic
  min_chunk_length: 50 # drop chunks shorter than this
  supported_extensions: [".pdf", ".txt", ".md", ".html"]

# ── Embedding ────────────────────────────────────────────────
embedding:
  provider: "openai" # openai | huggingface
  openai_model: "text-embedding-3-small"
  hf_model: "BAAI/bge-small-en-v1.5"
  dimension: 1536 # 1536 for text-embedding-3-small
  batch_size: 32

# ── Vector Store ─────────────────────────────────────────────
vector_store:
  provider: "chroma" # chroma | faiss
  persist_directory: "data/chroma_db"
  collection_name: "self_healing_rag"
  distance_metric: "cosine"

# ── Retrieval ────────────────────────────────────────────────
retrieval:
  k: 10 # number of candidates to retrieve
  final_k: 4 # top-k after re-ranking
  alpha: 0.7 # weight for dense vs BM25 (hybrid)
  score_threshold: 0.3 # minimum similarity score to include
  use_reranker: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  use_hyde: false # HyDE (hypothetical doc embedding)
  use_multi_query: false

# ── Generation ───────────────────────────────────────────────
generation:
  provider: "openai" # openai | anthropic | ollama
  openai_model: "gpt-4o-mini"
  anthropic_model: "claude-3-5-haiku-20241022"
  ollama_model: "llama3.1:8b"
  ollama_base_url: "http://localhost:11434"
  temperature: 0.2
  max_tokens: 1024
  stream: false
  token_budget: 3000 # max context tokens fed to LLM

# ── Evaluation thresholds (Phase 2) ─────────────────────────
evaluation:
  faithfulness_threshold: 0.75
  relevance_threshold: 0.70
  grounding_threshold: 0.65
  max_heal_rounds: 3

# ── Database ─────────────────────────────────────────────────
database:
  url: "sqlite+aiosqlite:///data/self_healing_rag.db"

# ── Adaptation (Phase 4) ─────────────────────────────────────
adaptation:
  # Quality tracker
  ewm_alpha: 0.3 # exponential weight for rolling quality (0=slow, 1=instant)
  drop_threshold: 0.25 # quality_score below this → drop chunk from store
  quarantine_threshold: 0.40 # quality_score below this → flag for review but keep

  # Chunk evolver
  max_failure_count: 5 # drop chunk after this many failures regardless of score
  evolver_batch_size: 50 # max chunks inspected per evolver run

  # Retrieval tuner
  k_candidates: [6, 8, 10, 12, 15] # k values to try
  alpha_candidates: [0.5, 0.6, 0.7, 0.8, 0.9] # alpha (dense weight) values to try
  tuner_min_samples: 20 # minimum QueryLog rows needed before tuning
  tuner_lookback: 200 # number of most-recent logs to score on

  # Prompt optimizer
  prompt_optimizer_n_examples: 3 # few-shot examples to prepend
  prompt_optimizer_min_score: 0.85 # minimum weighted_score to qualify as a good example

# ── API ──────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]
  api_key_header: "X-API-Key"

# ── Observability (Phase 5) ───────────────────────────────────
observability:
  # Metrics
  metrics_enabled: true
  metrics_path: "/metrics" # Prometheus scrape endpoint

  # Tracer
  tracer_enabled: true
  trace_log_path: "data/logs/traces.jsonl"
  trace_max_file_mb: 50 # rotate when file exceeds this size

  # Alerting
  alerting_enabled: true
  alert_score_drop_threshold: 0.15 # alert if avg weighted_score drops by this much
  alert_heal_rate_threshold: 0.5 # alert if >50% of queries need healing
  alert_latency_p95_ms: 5000 # alert if p95 latency exceeds this
  alert_window_queries: 50 # rolling window of queries to evaluate alerts on
  alert_backend: "log" # "log" | "webhook" | "slack"
  alert_webhook_url: "" # only used when alert_backend = "webhook"
  alert_slack_webhook_url: "" # only used when alert_backend = "slack"
